services:
  etcd:
    image: bitnamilegacy/etcd:3.6
    restart: unless-stopped
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: http://127.0.0.1:2379
    ports:
      - "2379:2379"
      - "2380:2380"

  llm-d-inference-sim:
    image: ghcr.io/llm-d/llm-d-inference-sim:v0.7.1
    restart: unless-stopped
    command:
      - "--model"
      - "sim-model"
      - "--served-model-name"
      - "sim-model"
      - "--port"
      - "8000"
      - "--mode"
      - "echo"
      - "--seed"
      - "42"
    ports:
      - "18000:8000"
