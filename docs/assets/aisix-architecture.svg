<svg viewBox="0 0 1200 510" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl dsc" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="ttl">AISIX AI Gateway architecture</title>
  <desc id="dsc">Your apps speak one OpenAI- or Anthropic-compatible API to the AISIX gateway, which applies API key auth, rate limiting and budgets, guardrails, caching, routing and failover, and observability, then dispatches to providers including OpenAI, Anthropic, Google Gemini, AWS Bedrock, Azure OpenAI, DeepSeek, and any OpenAI-compatible endpoint.</desc>
