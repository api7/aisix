deployment:
  etcd:
    host:
      - "https://127.0.0.1:7943"
    prefix: /aisix
    timeout: 30
    tls:
      ca_file: ca.pem
      cert_file: cert.pem
      key_file: key.pem
      insecure_skip_verify: true
  admin:
    admin_key:
      - key: admin

server:
  proxy:
    listen: 0.0.0.0:3000
    tls:
      enabled: false
      cert_file: cert.pem
      key_file: key.pem
  admin:
    listen: 127.0.0.1:3001
